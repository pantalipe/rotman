<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #555;
    --green: #00ff88;
    --red: #ff4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 40px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .btn-new {
    background: var(--accent); color: #000; border: none; padding: 10px 24px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.15s;
  }
  .btn-new:hover { background: #fff; }

  main { padding: 40px; max-width: 1400px; margin: 0 auto; }
  .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }

  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

  .project-card {
    background: var(--surface); border: 1px solid var(--border); padding: 24px;
    cursor: pointer; transition: border-color 0.2s; position: relative; overflow: hidden;
  }
  .project-card:hover { border-color: var(--accent); }
  .project-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
  }
  .project-card:hover::before { transform: scaleX(1); }
  .card-channel { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); margin-bottom: 8px; }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 10px; line-height: 1.3; }
  .card-topic { font-size: 11px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-date { font-size: 10px; color: var(--muted); }

  .status-badge { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border: 1px solid; }
  .status-queued        { color: var(--muted); border-color: var(--muted); }
  .status-generating_script,
  .status-script_ready,
  .status-generating_audio,
  .status-audio_ready   { color: var(--accent); border-color: var(--accent); }
  .status-generating_images,
  .status-images_ready,
  .status-assembling    { color: var(--accent2); border-color: var(--accent2); }
  .status-done          { color: var(--green); border-color: var(--green); }
  .status-error         { color: var(--red); border-color: var(--red); }

  .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 0; color: var(--muted); }
  .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 8px; color: var(--surface2); }

  /* MODALS */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal-new { background: var(--surface); border: 1px solid var(--border); width: 560px; max-width: 95vw; padding: 40px; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 32px; }
  .modal-title span { color: var(--accent); }

  .field { margin-bottom: 24px; }
  .field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 12px 16px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none;
    transition: border-color 0.2s; resize: vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface); }

  .modal-actions { display: flex; gap: 12px; margin-top: 8px; }
  .btn-primary {
    background: var(--accent); color: #000; border: none; padding: 12px 32px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer; flex: 1; transition: background 0.15s;
  }
  .btn-primary:hover { background: #fff; }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-cancel {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 12px 24px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--text); }

  /* DETAIL */
  .modal-detail {
    background: var(--surface); border: 1px solid var(--border);
    width: 900px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 40px;
  }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .detail-channel { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); margin-bottom: 6px; }
  .detail-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; }
  .btn-close {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    width: 36px; height: 36px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
  }
  .btn-close:hover { color: var(--text); border-color: var(--text); }

  /* PIPELINE LOG */
  .pipeline-box { background: var(--bg); border: 1px solid var(--border); margin-bottom: 28px; }
  .pipeline-box-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .pipeline-box-header span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .pipeline-log {
    padding: 16px; font-size: 11px; line-height: 2;
    max-height: 160px; overflow-y: auto; color: var(--accent);
  }
  .pipeline-log .log-line { display: block; }
  .pipeline-log .log-line.error { color: var(--red); }

  /* ACTION BUTTONS */
  .action-bar { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .btn-action {
    padding: 9px 20px; font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; border: 1px solid;
  }
  .btn-retry { color: var(--accent); border-color: var(--accent); background: transparent; }
  .btn-retry:hover { background: var(--accent); color: #000; }
  .btn-delete { color: var(--red); border-color: var(--red); background: transparent; }
  .btn-delete:hover { background: var(--red); color: #000; }

  /* PIPELINE STEPS */
  .steps { display: flex; gap: 0; margin-bottom: 28px; }
  .step {
    flex: 1; text-align: center; padding: 10px 4px;
    border: 1px solid var(--border); border-right: none; font-size: 9px;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted); position: relative;
  }
  .step:last-child { border-right: 1px solid var(--border); }
  .step.active { color: var(--accent); border-color: var(--accent); background: rgba(232,255,0,0.04); }
  .step.done { color: var(--green); border-color: var(--border); }
  .step.error { color: var(--red); border-color: var(--red); }

  /* SCENES */
  .scenes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .scene-card { background: var(--bg); border: 1px solid var(--border); overflow: hidden; }
  .scene-img-placeholder {
    width: 100%; aspect-ratio: 16/9; background: var(--surface2);
    display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted);
  }
  .scene-body { padding: 10px 12px; }
  .scene-num { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .scene-narration { font-size: 11px; line-height: 1.5; }

  /* VIDEO */
  .video-section { margin-bottom: 28px; }
  .video-section video { width: 100%; max-width: 560px; border: 1px solid var(--border); display: block; margin-top: 12px; }

  /* SCHEDULE */
  .schedule-section { border-top: 1px solid var(--border); padding-top: 24px; }
  .schedule-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; margin-bottom: 18px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .platforms { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .platform-btn {
    display: flex; align-items: center; gap: 8px; padding: 9px 16px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px;
    transition: all 0.15s; text-transform: uppercase;
  }
  .platform-btn.selected { border-color: var(--accent); color: var(--accent); }
  .platform-btn .dot { width: 6px; height: 6px; border: 1px solid currentColor; border-radius: 50%; transition: background 0.15s; }
  .platform-btn.selected .dot { background: var(--accent); }
  .schedule-row { display: flex; gap: 12px; align-items: flex-end; }
  .schedule-row .field { flex: 1; margin-bottom: 0; }
  .btn-schedule {
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    padding: 12px 24px; font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .btn-schedule:hover { background: var(--accent); color: #000; }
  .schedule-saved { margin-top: 10px; font-size: 11px; color: var(--green); display: none; }

  /* ANIMATIONS */
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .pulsing { animation: pulse 1.4s ease-in-out infinite; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">ROT<span>MAN</span></div>
  <button class="btn-new" onclick="openNewModal()">+ New Video</button>
</header>

<main>
  <p class="section-label">Projects</p>
  <div class="projects-grid" id="projects-grid">
    <div class="empty-state"><h2>No videos yet</h2><p>Click "New Video" to get started</p></div>
  </div>
</main>

<!-- NEW VIDEO MODAL -->
<div class="modal-overlay" id="modal-new">
  <div class="modal-new">
    <h2 class="modal-title">New <span>Video</span></h2>
    <div class="field">
      <label>Channel</label>
      <select id="new-channel">
        <option value="bitcoinfacil">bitcoinfacil</option>
        <option value="pandapoints">PandaPoints</option>
        <option value="general">General</option>
      </select>
    </div>
    <div class="field">
      <label>Describe the video</label>
      <textarea id="new-topic" rows="5" placeholder="Ex: Explain what Bitcoin halving is and why it matters for the price, in simple terms..."></textarea>
    </div>
    <p style="font-size:10px;color:var(--muted);margin-bottom:24px;line-height:1.7">
      After clicking Generate, the pipeline runs automatically:<br>
      Script → Audio → Images → Final video
    </p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNewModal()">Cancel</button>
      <button class="btn-primary" id="btn-generate" onclick="createProject()">Generate</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-detail" id="modal-detail-content"></div>
</div>

<script>
const STEPS = [
  { key: 'queued',             label: 'Queued' },
  { key: 'generating_script',  label: 'Script' },
  { key: 'script_ready',       label: 'Script' },
  { key: 'generating_audio',   label: 'Audio' },
  { key: 'audio_ready',        label: 'Audio' },
  { key: 'generating_images',  label: 'Images' },
  { key: 'images_ready',       label: 'Images' },
  { key: 'assembling',         label: 'Video' },
  { key: 'done',               label: 'Done' },
];

const STEP_ORDER = ['Script', 'Audio', 'Images', 'Video', 'Done'];

function stepState(currentStatus, stepLabel) {
  const order = STEP_ORDER;
  const statusToStep = {
    queued: -1,
    generating_script: 0, script_ready: 0,
    generating_audio: 1,  audio_ready: 1,
    generating_images: 2, images_ready: 2,
    assembling: 3,
    done: 4,
    error: -2,
  };
  const currentIdx = statusToStep[currentStatus] ?? -1;
  const stepIdx = order.indexOf(stepLabel);
  if (currentStatus === 'error') return 'error';
  if (stepIdx < currentIdx) return 'done';
  if (stepIdx === currentIdx) return 'active';
  return '';
}

function statusText(s) {
  return {
    queued: 'Queued',
    generating_script: 'Writing script...',
    script_ready: 'Script ready',
    generating_audio: 'Generating audio...',
    audio_ready: 'Audio ready',
    generating_images: 'Generating images...',
    images_ready: 'Images ready',
    assembling: 'Assembling video...',
    done: 'Done ✓',
    error: 'Error',
  }[s] || s;
}

// ── MODAL NEW ──────────────────────────────────────────────────────────
function openNewModal() {
  document.getElementById('modal-new').classList.add('open');
  setTimeout(() => document.getElementById('new-topic').focus(), 50);
}
function closeNewModal() {
  document.getElementById('modal-new').classList.remove('open');
  document.getElementById('new-topic').value = '';
  const btn = document.getElementById('btn-generate');
  btn.disabled = false;
  btn.textContent = 'Generate';
}
document.getElementById('modal-new').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeNewModal();
});

// ── CREATE ──────────────────────────────────────────────────────────────
async function createProject() {
  const topic = document.getElementById('new-topic').value.trim();
  const channel = document.getElementById('new-channel').value;
  if (!topic) return;
  const btn = document.getElementById('btn-generate');
  btn.disabled = true; btn.textContent = 'Starting...';
  await fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic, channel }),
  });
  closeNewModal();
  loadProjects();
}

// ── LIST ────────────────────────────────────────────────────────────────
async function loadProjects() {
  const res = await fetch('/api/projects');
  const projects = await res.json();
  const grid = document.getElementById('projects-grid');
  if (!projects.length) {
    grid.innerHTML = '<div class="empty-state"><h2>No videos yet</h2><p>Click "New Video" to get started</p></div>';
    return;
  }
  grid.innerHTML = projects.map(p => {
    const title = p.script?.title || p.topic;
    const date = new Date(p.created_at).toLocaleDateString('pt-BR');
    const isActive = !['done','error'].includes(p.status);
    return `
      <div class="project-card" onclick="openDetail('${p.id}')">
        <div class="card-channel">${p.channel}</div>
        <div class="card-title">${title}</div>
        <div class="card-topic">${p.topic}</div>
        <div class="card-footer">
          <span class="status-badge status-${p.status} ${isActive ? 'pulsing' : ''}">${statusText(p.status)}</span>
          <span class="card-date">${date}</span>
        </div>
      </div>`;
  }).join('');
}

// ── DETAIL ──────────────────────────────────────────────────────────────
let detailInterval = null;
let currentDetailId = null;
const platformState = {};

function openDetail(id) {
  currentDetailId = id;
  document.getElementById('modal-detail').classList.add('open');
  loadDetail(id);
  detailInterval = setInterval(() => loadDetail(id), 3000);
}
function closeDetail() {
  document.getElementById('modal-detail').classList.remove('open');
  clearInterval(detailInterval);
  detailInterval = null;
  currentDetailId = null;
}
document.getElementById('modal-detail').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

async function loadDetail(id) {
  const res = await fetch('/api/projects/' + id);
  const p = await res.json();
  if (['done','error'].includes(p.status)) {
    clearInterval(detailInterval);
    loadProjects();
  }
  renderDetail(p);
}

function renderDetail(p) {
  if (!platformState[p.id]) platformState[p.id] = [...(p.post_to || [])];
  const sel = platformState[p.id];
  const title = p.script?.title || p.topic;
  const scenes = p.script?.scenes || [];
  const isActive = !['done','error'].includes(p.status);

  // Steps bar
  const stepsHtml = `
    <div class="steps">
      ${STEP_ORDER.map(s => {
        const state = stepState(p.status, s);
        return `<div class="step ${state}">${s}</div>`;
      }).join('')}
    </div>`;

  // Log
  const logs = p.log || [];
  const lastLog = logs[logs.length - 1] || statusText(p.status);
  const logLines = logs.slice(-6).map(l =>
    `<span class="log-line ${l.includes('Error') ? 'error' : ''}">${l}</span>`
  ).join('');

  const logHtml = `
    <div class="pipeline-box">
      <div class="pipeline-box-header">
        <span>Pipeline Log</span>
        <span class="status-badge status-${p.status} ${isActive ? 'pulsing' : ''}">${statusText(p.status)}</span>
      </div>
      <div class="pipeline-log">${logLines || `<span class="log-line">${lastLog}</span>`}</div>
    </div>`;

  // Action buttons
  let actionsHtml = '<div class="action-bar">';
  if (p.status === 'error') {
    actionsHtml += `<button class="btn-action btn-retry" onclick="retryProject('${p.id}')">↺ Retry</button>`;
  }
  actionsHtml += `<button class="btn-action btn-delete" onclick="deleteProject('${p.id}')">✕ Delete</button>`;
  actionsHtml += '</div>';

  // Video
  const videoHtml = p.status === 'done' ? `
    <div class="video-section">
      <p class="section-label">Final Video</p>
      <video controls src="/api/projects/${p.id}/video"></video>
    </div>` : '';

  // Scenes
  const scenesHtml = scenes.length ? `
    <p class="section-label" style="margin-bottom:14px">Scenes (${scenes.length})</p>
    <div class="scenes-grid">
      ${scenes.map(s => `
        <div class="scene-card">
          <div class="scene-img-placeholder">scene ${s.id}</div>
          <div class="scene-body">
            <div class="scene-num">Scene ${s.id} · ${s.duration}s</div>
            <div class="scene-narration">${s.narration}</div>
          </div>
        </div>`).join('')}
    </div>` : '';

  // Schedule
  const scheduleHtml = `
    <div class="schedule-section">
      <p class="schedule-title">Schedule & Publish</p>
      <div class="platforms">
        ${['tiktok','instagram','youtube'].map(pl => `
          <button class="platform-btn ${sel.includes(pl) ? 'selected' : ''}" id="plat-${p.id}-${pl}" onclick="togglePlatform('${p.id}','${pl}')">
            <span class="dot"></span>${pl}
          </button>`).join('')}
      </div>
      <div class="schedule-row">
        <div class="field">
          <label>Scheduled date & time</label>
          <input type="datetime-local" id="sched-${p.id}" value="${p.scheduled_at ? p.scheduled_at.slice(0,16) : ''}">
        </div>
        <button class="btn-schedule" onclick="saveSchedule('${p.id}')">Save</button>
      </div>
      <p class="schedule-saved" id="sched-saved-${p.id}">✓ Saved</p>
    </div>`;

  document.getElementById('modal-detail-content').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-channel">${p.channel}</div>
        <div class="detail-title">${title}</div>
      </div>
      <button class="btn-close" onclick="closeDetail()">✕</button>
    </div>
    ${stepsHtml}
    ${logHtml}
    ${actionsHtml}
    ${videoHtml}
    ${scenesHtml}
    ${scheduleHtml}`;
}

// ── ACTIONS ──────────────────────────────────────────────────────────────
async function retryProject(id) {
  await fetch(`/api/projects/${id}/retry`, { method: 'POST' });
  loadProjects();
  loadDetail(id);
  detailInterval = setInterval(() => loadDetail(id), 3000);
}

async function deleteProject(id) {
  if (!confirm('Delete this project?')) return;
  await fetch(`/api/projects/${id}`, { method: 'DELETE' });
  closeDetail();
  loadProjects();
}

function togglePlatform(projectId, platform) {
  if (!platformState[projectId]) platformState[projectId] = [];
  const arr = platformState[projectId];
  const idx = arr.indexOf(platform);
  if (idx === -1) arr.push(platform); else arr.splice(idx, 1);
  const btn = document.getElementById(`plat-${projectId}-${platform}`);
  if (btn) btn.classList.toggle('selected', arr.includes(platform));
}

async function saveSchedule(projectId) {
  const dt = document.getElementById(`sched-${projectId}`)?.value || null;
  await fetch(`/api/projects/${projectId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ scheduled_at: dt, post_to: platformState[projectId] || [] }),
  });
  const el = document.getElementById(`sched-saved-${projectId}`);
  if (el) { el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 2000); }
}

// ── BOOT ─────────────────────────────────────────────────────────────────
loadProjects();
setInterval(loadProjects, 5000);
</script>
</body>
</html>
